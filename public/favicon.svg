<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#137fec"/>
  <!-- Ballot box body -->
  <rect x="20" y="45" width="60" height="40" rx="5" fill="white" opacity="0.9"/>
  <!-- Slot -->
  <rect x="38" y="40" width="24" height="5" rx="2" fill="#137fec"/>
  <!-- Checkmark on ballot -->
  <polyline points="32,65 43,76 62,55" stroke="#137fec" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Paper going in -->
  <rect x="38" y="22" width="24" height="22" rx="3" fill="white"/>
  <line x1="43" y1="28" x2="57" y2="28" stroke="#137fec" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="34" x2="57" y2="34" stroke="#137fec" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="39" x2="52" y2="39" stroke="#137fec" stroke-width="2.5" stroke-linecap="round"/>
</svg>
